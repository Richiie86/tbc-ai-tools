services:
  - type: web
    name: tbctools-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    # Deploy automatically on every push to the connected branch, so merged
    # fixes go live without a manual deploy. Committed here (not just set in the
    # dashboard) so the intent survives any blueprint re-sync.
    autoDeploy: true
    healthCheckPath: /api/
    envVars:
      # Render only offers 3.11.x / 3.12.x — 3.13.4 does not exist there and
      # made every deploy fail instantly on the build step. Pin a real,
      # supported version.
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPERATOR_EMAIL
        sync: false
      - key: OPERATOR_PASSWORD
        sync: false
      - key: RESET_OPERATOR_PASSWORD
        value: "false"
      # Set your allowed frontend origins in the Render dashboard (comma-
      # separated). Leave unset to fall back to the locked-origin policy in
      # server.py (tbctools.org + any PRIMARY_DOMAIN below). Never hardcode
      # origins here — that would override the flexible env config and commit
      # production domains to version control.
      - key: CORS_ORIGINS
        sync: false
      # Optional: your own launch domain. When set, the fallback CORS policy
      # and previews automatically trust `https://<PRIMARY_DOMAIN>` and its
      # subdomains — so a deploy "just works" on the domain you chose.
      - key: PRIMARY_DOMAIN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
