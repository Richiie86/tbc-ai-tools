services:
  - type: web
    name: tbctools-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPERATOR_EMAIL
        sync: false
      - key: OPERATOR_PASSWORD
        sync: false
      - key: RESET_OPERATOR_PASSWORD
        value: "true"
      - key: CORS_ORIGINS
        value: "https://tbctools.org,https://www.tbctools.org"
      - key: ANTHROPIC_API_KEY
        sync: false
