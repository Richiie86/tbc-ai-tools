services:
  - type: web
    name: tbctools-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPERATOR_EMAIL
        sync: false
      - key: OPERATOR_PASSWORD
        sync: false
      - key: RESET_OPERATOR_PASSWORD
        value: "false"
      # Set your allowed frontend origins in the Render dashboard (comma-
      # separated). Leave unset to fall back to the locked-origin policy in
      # server.py (tbctools.org + any PRIMARY_DOMAIN below). Never hardcode
      # origins here — that would override the flexible env config and commit
      # production domains to version control.
      - key: CORS_ORIGINS
        sync: false
      # Optional: your own launch domain. When set, the fallback CORS policy
      # and previews automatically trust `https://<PRIMARY_DOMAIN>` and its
      # subdomains — so a deploy "just works" on the domain you chose.
      - key: PRIMARY_DOMAIN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
